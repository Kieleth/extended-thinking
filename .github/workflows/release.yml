name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        # Prevents the v0.1.1-tag-but-0.1.0-wheel case. Strip the leading `v`
        # from the tag and compare against the `project.version` field in
        # pyproject.toml. If they drift, the release fails before any upload.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('api/pyproject.toml', 'rb'))['project']['version'])")
          echo "tag:        $GITHUB_REF_NAME  →  $TAG_VERSION"
          echo "pyproject:  $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match pyproject.toml version '$FILE_VERSION'. Bump pyproject.toml and retag."
            exit 1
          fi
          echo "Version consistency OK."

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel + sdist
        run: |
          cd api && python -m build

      - name: twine check
        run: |
          cd api && python -m twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: api/dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Mandatory for Trusted Publishing (OIDC). No API token in GitHub secrets.
      # PyPI project must be configured with this repo as a trusted publisher.
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##*/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            dist/*
