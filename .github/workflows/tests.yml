name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install extended-thinking with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e "api/[dev]"

      - name: Unit tests
        # AT suite runs separately because Kuzu reserves a large virtual region
        # per store and combining both suites in one pytest invocation can
        # exhaust address space. See docs/acceptance-tests.md.
        run: |
          cd api && python -m pytest tests/ --ignore=tests/acceptance --tb=short

      - name: Acceptance tests (fast path + cassette replay)
        env:
          # Dummy key so the provider registry initializes. Cassette replay
          # intercepts HTTP before the key matters; this is not a real key.
          ANTHROPIC_API_KEY: sk-ant-ci-replay-dummy-key-not-real
        run: |
          cd api && python -m pytest tests/acceptance/ -m "acceptance or vcr" --tb=short

  build:
    name: wheel + sdist build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: |
          cd api && python -m build

      - name: twine check
        run: |
          cd api && python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: api/dist/
          retention-days: 14
