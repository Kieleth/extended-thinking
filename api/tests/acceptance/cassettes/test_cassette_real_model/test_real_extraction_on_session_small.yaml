- request:
    body: '{"max_tokens":4096,"messages":[{"role":"user","content":"You are analyzing
      a conversation to extract cognitive patterns. Given the conversation below,
      extract the key concepts the human is thinking about.\n\nFor each concept, provide:\n-
      **name**: Short label (2-5 words)\n- **category**: One of: topic, theme, question,
      decision, tension, entity\n- **description**: One sentence explaining it in
      context\n- **source_quote**: The human''s EXACT words (verbatim quote, max 2
      sentences) that demonstrate this concept. Must be from a [user] message, not
      the assistant.\n- **supersedes**: (optional) If this concept REPLACES a previously-held
      view, e.g., the user changed their mind, made a newer decision that contradicts
      an older one, list the names of existing concepts this supersedes. Otherwise
      omit or use empty list.\n- **source_created_at**: (optional) If the TEXT ITSELF
      states when the thought was written (e.g. a dated journal entry `## 2024-06-12`,
      a \"Updated 2025-03-01\" frontmatter line, a log-style `[2024-07-04]` prefix),
      return that date in ISO-8601 form (`YYYY-MM-DD` or full `YYYY-MM-DDTHH:MM:SS+00:00`).
      Do NOT infer, do NOT guess, do NOT use the date the conversation happened on.
      Only extract when the text explicitly anchors itself to a date. Omit otherwise.\n\nCategories:\n-
      **topic**: A concrete subject (a tool, pattern, technology, domain)\n- **theme**:
      A recurring tendency or preference (e.g., \"prefers simplicity\")\n- **question**:
      An open question being explored\n- **decision**: A choice that was made or proposed\n-
      **tension**: A trade-off or conflict being navigated\n- **entity**: A named
      thing (specific tool, library, project, person)\n\nRules:\n- Extract 3-10 concepts
      per conversation\n- Focus on what the HUMAN is thinking about, not what the
      AI suggests\n- Prefer specificity over generality (\"JWT auth\" not \"programming\")\n-
      source_quote MUST be the user''s actual words from the conversation, not paraphrased\n-
      Only claim `supersedes` when the user EXPLICITLY changed a previously-stated
      view. Don''t supersede on adjacent concepts that coexist. When in doubt, omit.\n\n##
      Existing concepts (for supersession reference)\n(none yet)\n\nReturn ONLY valid
      JSON, an array of objects:\n```json\n[\n  {\"name\": \"...\", \"category\":
      \"...\", \"description\": \"...\", \"source_quote\": \"...\", \"supersedes\":
      [], \"source_created_at\": \"\"},\n  ...\n]\n```\n\nCONVERSATION:\n[user]: Decision:
      going with Kuzu for the KG layer. I''ll keep ChromaDB for vector embeddings.
      SQLite stays only for the legacy ConceptStore until migration is done.\n\n[assistant]:
      That split matches how Graphiti and most temporal KG systems structure things.
      ChromaDB for vectors, Kuzu for the graph, ConceptStore deprecated. Keep the
      migration guard strict so nothing new lands in SQLite.\n\n---\n\n[user]: Kuzu
      sounds good. What about performance? I''ll be writing concepts and edges frequently
      during the concept extraction phase.\n\n[assistant]: Kuzu''s column-store backend
      handles heavy bulk inserts well. For write-heavy concept extraction you''d want
      to batch inside a transaction. The bitemporal filter at read time ((valid_from
      <= as_of AND valid_to IS NULL)) is a clean Cypher pattern and Kuzu indexes it
      efficiently.\n\n---\n\n[user]: I need a store for a bitemporal knowledge graph.
      SQLite with two timestamp columns would work, but I''m worried about query ergonomics
      and not really testing the ''graph'' part.\n\n[assistant]: SQLite gets you row-level
      storage of (valid_time, transaction_time) but every graph traversal becomes
      a JOIN. If you want bitemporal semantics with real graph queries, look at Kuzu.
      It''s embedded, Cypher-native, and supports temporal properties on edges out
      of the box."}],"model":"claude-haiku-4-5-20251001"}'
